name: Verify Harbor image signature

on:
  workflow_dispatch:
    inputs:
      image_ref:
        description: "Полный reference образа с digest"
        required: true
        default: "harbor.dev.k8s-dev.org/team-secops/k8s-hello-secops-test@sha256:a8af16f65576b772fd51e763fe3b169637ddaaaf6f052e30442565c67000871c"

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-22.04

    steps:
      - name: Login to Harbor
        uses: docker/login-action@v3
        with:
          registry: harbor.dev.k8s-dev.org
          username: robot$team-secops+test
          password: ${{ secrets.HARBOR_SANDBOX_PASSWORD }}

      - name: Install Cosign
        uses: sigstore/cosign-installer@v3

      - name: Verify image signature from lidofinance/k8s-hello-secops-test main branch
        run: |
          cosign verify \
            --certificate-oidc-issuer https://token.actions.githubusercontent.com \
            --certificate-identity-regexp '^https://github.com/lidofinance/k8s-hello-secops-test/.+@refs/heads/main$' \
            "${{ github.event.inputs.image_ref }}"
