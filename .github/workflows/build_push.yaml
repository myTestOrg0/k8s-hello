name: Build and push k8s-hello

on:
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  build-sign-push:
    runs-on: ubuntu-22.04

    env:
      REGISTRY: harbor.dev.k8s-dev.org
      REPOSITORY: team-secops/k8s-hello-secops-test
      TAG: 1.0.0

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup buildx
        uses: docker/setup-buildx-action@v3.3.0

      - name: Login to Harbor
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: robot$team-secops+test
          password: ${{ secrets.HARBOR_SANDBOX_PASSWORD }}

      - name: Build image locally
        run: |
          docker build \
            -t ${{ env.REGISTRY }}/${{ env.REPOSITORY }}:${{ env.TAG }} \
            .

      - name: Push image to Harbor
        run: |
          docker push ${{ env.REGISTRY }}/${{ env.REPOSITORY }}:${{ env.TAG }}

      - name: Resolve pushed image digest
        id: digest
        run: |
          DIGEST="$(docker buildx imagetools inspect \
            ${{ env.REGISTRY }}/${{ env.REPOSITORY }}:${{ env.TAG }} \
            --format '{{json .Manifest.Digest}}' | tr -d '"')"
          echo "digest=$DIGEST" >> "$GITHUB_OUTPUT"

      - name: Install Cosign
        uses: sigstore/cosign-installer@v3

      - name: Sign image with Cosign keyless
        env:
          COSIGN_YES: "true"
        run: |
          cosign sign \
            -a repo="https://github.com/lidofinance/helm-charts-secops" \
            -a ref=${{ github.ref }} \
            -a sha=${{ github.sha }} \
            ${{ env.REGISTRY }}/${{ env.REPOSITORY }}@${{ steps.digest.outputs.digest }}

      - name: Verify signature
        run: |
          cosign verify \
            --certificate-oidc-issuer https://token.actions.githubusercontent.com \
            --certificate-identity-regexp "https://github.com/${{ github.repository }}/.+" \
            ${{ env.REGISTRY }}/${{ env.REPOSITORY }}@${{ steps.digest.outputs.digest }}
