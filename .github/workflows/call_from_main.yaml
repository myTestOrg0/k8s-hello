name: Caller

on:
  workflow_dispatch: 

permissions:
  actions: write
  contents: read

jobs:
  trigger-main-workflow:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger workflow on main
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh workflow run hello_workflow.yaml \
            --repo "${{ github.repository }}" \
            --ref main"
