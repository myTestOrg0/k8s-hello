name: PROD Build and push k8s-hello

on:
  workflow_dispatch:
    inputs:
      tag_name:
        description: "Image tag"
        required: true
        default: "v1.0.0"
        type: string

permissions:
  contents: read
  id-token: write

jobs:
  build-sign-push:
    runs-on: ubuntu-22.04
    environment: prod

    env:
      REGISTRY: registry.prod.k8s-prod.org
      REPOSITORY: team-secops/k8s-hello-secops-test
      TAG: ${{inputs.tag_name}}

    steps:
      - name: Checkut
        uses: actions/checkout@v4

      - name: Setup buildx
        uses: docker/setup-buildx-action@v3.3.0

      - name: Login to Harbor
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: robot$team-secops-rw
          password: ${{ secrets.HARBOR_PROD_TOKEN }}

      - name: Build image locally
        run: |
          docker build \
            -t ${{ env.REGISTRY }}/${{ env.REPOSITORY }}:${{ env.TAG }} \
            .

      - name: Push image to Harbor
        run: |
          docker push ${{ env.REGISTRY }}/${{ env.REPOSITORY }}:${{ env.TAG }}
